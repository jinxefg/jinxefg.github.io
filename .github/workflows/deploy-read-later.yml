name: Deploy read-later to Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [read-later-deploy]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Diagnostic — verify repo access
        env:
          REPO: ${{ github.repository }}
          RL_REPO: jinxefg/Read-later-App
          TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          echo "Checking access to workflow repo:"
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/$REPO)
          echo "GET /repos/$REPO -> HTTP $status"

          echo "Checking access to Read-later-App:"
          status2=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://api.github.com/repos/$RL_REPO)
          echo "GET /repos/$RL_REPO -> HTTP $status2"

          if [ "$status2" -ne 200 ]; then
            echo "ERROR: Cannot access $RL_REPO — check REPO_ACCESS_TOKEN scopes."
            exit 1
          fi

      - name: Checkout Read-later-App repository
        uses: actions/checkout@v4
        with:
          repository: jinxefg/Read-later-App
          path: read-later-src
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd read-later-src
          npm install

      - name: Build Vite app with correct base path
        run: |
          cd read-later-src
          npm run build -- --base=/read-later/

      - name: Copy build output to Pages site
        run: |
          rm -rf read-later || true
          mkdir -p read-later
          cp -a read-later-src/dist/. read-later/

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add read-later
          git commit -m "Deploy Read-later-App build" || echo "No changes to commit"
          git push
