name: Deploy read-later to Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [read-later-deploy]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pages repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Checkout Read-later-App repository
        uses: actions/checkout@v4
        with:
          repository: jinxefg/Read-later-App
          path: read-later-src
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          cd read-later-src/readlater
          npm install

      - name: Build Vite app
        run: |
          cd read-later-src/readlater
          npm run build -- --base=/read-later/

      - name: Copy build output to Pages site
        run: |
          rm -rf read-later || true
          mkdir -p read-later
          cp -a read-later-src/readlater/dist/. read-later/

      - name: Commit and push built files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add read-later
          git commit -m "Deploy Read-later-App build" || echo "No changes to commit"
          git push
