name: Deploy read-later to Pages

on:
  workflow_dispatch:
  repository_dispatch:
    types: [read-later-deploy]

permissions:
  contents: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Pages repo (this repo)
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Diagnostic — check access for workflow repo and read-later repo
        env:
          REPO: ${{ github.repository }}
          RL_REPO: jinxefg/read-later
        run: |
          echo "github.repository = $REPO"
          # Check API access to the workflow repo using GITHUB_TOKEN
          status=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/repos/$REPO)
          echo "GET /repos/$REPO -> HTTP $status"
          if [ "$status" -ne 200 ]; then
            echo "Workflow repo GET returned $status. Check workflow permissions or GITHUB_TOKEN."
            exit 1
          fi

          # Check API access to the read-later repo using the PAT stored in REPO_ACCESS_TOKEN
          status2=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: Bearer ${{ secrets.REPO_ACCESS_TOKEN }}" https://api.github.com/repos/$RL_REPO)
          echo "GET /repos/$RL_REPO -> HTTP $status2"
          if [ "$status2" -ne 200 ]; then
            echo "Read-later repo GET returned $status2. Ensure REPO_ACCESS_TOKEN exists, is valid, and has access to $RL_REPO."
            exit 1
          fi

      - name: Checkout read-later repository
        uses: actions/checkout@v4
        with:
          repository: jinxefg/read-later
          path: read-later-src
          token: ${{ secrets.REPO_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd read-later-src
          npm ci

      - name: Build (Vite) with correct base path
        run: |
          cd read-later-src
          npm run build -- --base /read-later/

      - name: Copy build output to site folder
        run: |
          rm -rf read-later || true
          mkdir -p read-later
          cp -a read-later-src/dist/. read-later/

      - name: Commit and push built files to Pages repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add read-later
          if ! git diff --staged --quiet; then
            git commit -m "Deploy read-later to /read-later [skip ci]"
            git push origin HEAD:main
          else
            echo "No changes to deploy"
          fi
