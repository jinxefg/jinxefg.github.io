<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} - {{ site.title }}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            line-height: 1.6;
        }
        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 1rem 2rem;
        }
        header h1 {
            margin-bottom: 1rem;
            color: #58a6ff;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }
        nav a {
            color: #58a6ff;
            text-decoration: none;
            transition: color 0.2s;
        }
        nav a:hover {
            color: #79c0ff;
            text-decoration: underline;
        }
        main {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        main h1, main h2, main h3 {
            color: #58a6ff;
            margin: 1.5rem 0 1rem;
        }
        main a {
            color: #58a6ff;
        }
        main a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="https://read-later-app-delta.vercel.app" target="_blank">Read Later App</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
        {{ content }}
    </main>
</body>
</html>
